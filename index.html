<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tower of Hanoi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    .controls {
      margin: 20px;
    }

    .tower-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 300px;
      gap: 50px;
    }

    .tower {
      width: 120px;
      height: 250px;
      border: 2px solid #333;
      position: relative;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      padding-bottom: 10px;
      background: white;
    }

    .disc {
      height: 20px;
      margin: 3px 0;
      border-radius: 5px;
      background: steelblue;
      color: white;
      text-align: center;
      font-size: 12px;
    }

    button, input {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>Tower of Hanoi</h1>

  <div class="controls">
    <label>Discs:</label>
    <input type="number" id="discCount" value="3" min="1" max="8">
    <button onclick="init()">Reset</button>
    <button onclick="solve()">Solve</button>
  </div>

  <div class="tower-container">
    <div class="tower" id="A"></div>
    <div class="tower" id="B"></div>
    <div class="tower" id="C"></div>
  </div>

  <script>
    let towers = {
      A: [],
      B: [],
      C: []
    };

    let moves = [];
    let speed = 500;

    function init() {
      towers = { A: [], B: [], C: [] };
      moves = [];

      document.getElementById("A").innerHTML = "";
      document.getElementById("B").innerHTML = "";
      document.getElementById("C").innerHTML = "";

      let n = parseInt(document.getElementById("discCount").value);

      for (let i = n; i >= 1; i--) {
        towers.A.push(i);
        drawDisc("A", i, n);
      }
    }

    function drawDisc(tower, size, max) {
      let disc = document.createElement("div");
      disc.className = "disc";
      disc.style.width = (size / max * 100) + "%";
      disc.textContent = size;
      document.getElementById(tower).appendChild(disc);
    }

    function moveDisc(from, to) {
      let disc = towers[from].pop();
      towers[to].push(disc);

      let fromDiv = document.getElementById(from);
      let toDiv = document.getElementById(to);

      let discElem = fromDiv.lastChild;
      toDiv.appendChild(discElem);
    }

    function hanoi(n, from, to, aux) {
      if (n === 1) {
        moves.push([from, to]);
        return;
      }
      hanoi(n - 1, from, aux, to);
      moves.push([from, to]);
      hanoi(n - 1, aux, to, from);
    }

    function solve() {
      let n = parseInt(document.getElementById("discCount").value);
      moves = [];

      hanoi(n, "A", "C", "B");

      let i = 0;
      let interval = setInterval(() => {
        if (i >= moves.length) {
          clearInterval(interval);
          return;
        }
        let [from, to] = moves[i];
        moveDisc(from, to);
        i++;
      }, speed);
    }

    // Initialize on load
    init();
  </script>

</body>
</html>
