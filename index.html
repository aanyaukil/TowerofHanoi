<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tower of Hanoi - Grand Master</title>
  <style>
    :root {
      --wood: #5d4037;
      --bg-color: #0a192f;
      --text-color: #64ffda;
      --accent: #112240;
      --gold: #f1c40f;
      --silver: #bdc3c7;
      --bronze: #cd7f32;
    }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-y: auto;
      padding-bottom: 50px;
    }
    h1 { 
      margin: 30px 0 10px 0; 
      text-transform: uppercase; 
      letter-spacing: 8px; 
      font-size: 3.5rem; /* Bigger Title */
      text-shadow: 0 0 10px rgba(100, 255, 218, 0.3);
    }

    .main-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1200px;
    }

    .game-section {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      margin-bottom: 40px;
    }

    /* Side Panel */
    .side-panel {
      width: 240px;
      background: var(--accent);
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      font-size: 0.85rem;
      border: 1px solid var(--text-color);
    }
    .medal-item { margin: 8px 0; display: flex; justify-content: space-between; }
    
    .controls { 
      margin: 20px 0; 
      padding: 15px 25px; 
      background: var(--accent); 
      border-radius: 12px; 
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    
    .tower-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 400px;
      gap: 60px;
      padding: 0 40px 40px 40px;
      transition: filter 0.3s, opacity 0.3s;
    }

    .paused-game .tower-container { opacity: 0.1; pointer-events: none; }
    .blindfolded .tower-container { filter: brightness(0); background: black; border-radius: 20px; }
    .blindfolded .tower-container:hover { filter: brightness(0.15); }

    .tower {
      width: 150px; height: 350px; position: relative;
      display: flex; flex-direction: column-reverse; align-items: center; cursor: pointer;
    }
    .tower.selected { background: rgba(100, 255, 218, 0.1); border-radius: 15px; }
    .tower::before { content: ""; position: absolute; bottom: 0; width: 12px; height: 100%; background: var(--wood); border-radius: 6px; z-index: 1; }
    .tower::after { content: ""; position: absolute; bottom: -15px; width: 180px; height: 15px; background: var(--wood); border-radius: 5px; }

    .disc { height: 22px; margin-bottom: 2px; border-radius: 5px; color: #0a192f; text-align: center; line-height: 22px; font-size: 12px; font-weight: bold; z-index: 2; cursor: grab; }
    .hide-numbers .disc { color: transparent; }
    .monochrome .disc { background: #ccd6f6 !important; color: #0a192f !important; border: 1px solid #8892b0; }

    button, input, select { 
      background: transparent; border: 1px solid var(--text-color); 
      color: var(--text-color); padding: 6px 12px; border-radius: 4px; 
      cursor: pointer; margin: 0 4px; font-family: inherit;
    }
    button:hover { background: var(--text-color); color: var(--bg-color); }
    select option { background: var(--accent); color: var(--text-color); }
    
    #timer { position: fixed; top: 25px; right: 40px; font-size: 1.8rem; color: var(--gold); font-weight: bold; }
    #message { margin: 15px 0; font-size: 1.4rem; color: var(--gold); font-weight: bold; min-height: 30px; }

    /* Leaderboard Table */
    .leaderboard {
      width: 80%;
      max-width: 800px;
      background: var(--accent);
      border-collapse: collapse;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    .leaderboard th, .leaderboard td { padding: 12px; text-align: center; border-bottom: 1px solid #233554; }
    .leaderboard th { background: #172a45; color: var(--gold); text-transform: uppercase; font-size: 0.8rem; }
    .leaderboard tr:hover { background: rgba(100, 255, 218, 0.05); }

    #settingsModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
    .modal-content { background-color: var(--accent); margin: 10% auto; padding: 30px; border: 1px solid var(--text-color); width: 400px; border-radius: 10px; position: relative; text-align: left; }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: var(--text-color); }
  </style>
</head>
<body id="game-body">

  <div id="timer">00:00</div>
  <h1>Tower of Hanoi</h1>

  <div class="main-wrapper">
    <div class="game-section">
      <div class="side-panel">
        <h3 style="margin-top:0; border-bottom:1px solid #64ffda; padding-bottom:5px;">Level Goals</h3>
        <div class="medal-item" style="color:var(--gold)"><span>🥇 Gold:</span> <span id="targetGoldMoves">--</span>m</div>
        <div class="medal-item" style="color:var(--silver)"><span>🥈 Silver:</span> <span id="targetSilverMoves">--</span>m</div>
        <div class="medal-item" style="color:var(--bronze)"><span>🥉 Bronze:</span> <span id="targetBronzeMoves">--</span>m</div>
        <hr style="border:0.5px solid #233554;">
        <div class="medal-item" style="color:var(--gold)"><span>🥇 Gold Time:</span> <span id="targetGoldTime">--</span></div>
        <div class="medal-item" style="color:var(--silver)"><span>🥈 Silver Time:</span> <span id="targetSilverTime">--</span></div>
        <div class="medal-item" style="color:var(--bronze)"><span>🥉 Bronze Time:</span> <span id="targetBronzeTime">--</span></div>
        <hr style="border:0.5px solid #233554;">
        <div style="font-size:0.75rem; color:#8892b0;">World Record (<span id="wrCount">3</span> rings):<br><span id="worldRecord" style="color:var(--gold)">--</span></div>
      </div>

      <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="controls">
          <label>Rings: </label>
          <input type="number" id="discCount" value="3" min="3" max="15" style="width:50px;" onkeydown="if(event.key==='Enter') init()">
          <button onclick="init()">Restart (R)</button>
          <button onclick="togglePause()" id="pauseBtn">Pause (Space)</button>
          <button onclick="undoMove()">Undo (U)</button>
          <button onclick="toggleModal()">Settings</button>
        </div>

        <div class="tower-container" id="game-container">
          <div class="tower" id="tower1" data-id="1"></div>
          <div class="tower" id="tower2" data-id="2"></div>
          <div class="tower" id="tower3" data-id="3"></div>
        </div>

        <div id="message"></div>

        <div class="controls" style="margin-top: 0;">
          <label>Auto-Solve: </label>
          <select id="solveSpeed">
            <option value="500">Slow</option>
            <option value="250" selected>Medium</option>
            <option value="50">Fast</option>
            <option value="5">Instantish</option>
          </select>
          <button onclick="autoSolve()" id="solveBtn">Start Solving</button>
          <div style="display:inline-block; margin-left:20px;">Moves: <span id="moveCount" style="color:var(--gold)">0</span></div>
        </div>
      </div>
    </div>

    <h2 style="color:var(--gold); letter-spacing:3px;">Global Records</h2>
    <table class="leaderboard">
      <thead>
        <tr>
          <th>Rings</th>
          <th>Best Moves</th>
          <th>Best Time</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="recordTableBody">
        </tbody>
    </table>
  </div>

  <div id="settingsModal">
    <div class="modal-content">
      <span class="close-btn" onclick="toggleModal()">&times;</span>
      <h3>Configuration</h3>
      <div style="display:flex; flex-direction:column; gap:15px;">
        <label><input type="checkbox" id="checkNumbers" checked onchange="applyVisualSettings()"> Show Ring Numbers</label>
        <label><input type="checkbox" id="checkMono" onchange="applyVisualSettings()"> Monochrome Mode</label>
        <label style="color:#ff4d4d;"><input type="checkbox" id="checkBlind" onchange="applyVisualSettings()"> BLINDFOLD MODE</label>
      </div>
      <button style="width:100%; margin-top:25px; border-color:#ff4d4d; color:#ff4d4d;" onclick="clearAllProgress()">WIPE ALL RECORDS</button>
    </div>
  </div>

  <script>
    let towers = { 1: [], 2: [], 3: [] };
    let moveHistory = [];
    let selectedTower = null;
    let moves = 0, startTime, timerInterval, totalElapsedBeforePause = 0;
    let gameActive = false, timerRunning = false, isPaused = false, isSolving = false;

    const worldRecords = {
      3: "0.68s", 4: "1.45s", 5: "3.20s", 6: "6.80s", 7: "14.2s", 8: "29.5s", 9: "1m 02s", 10: "2m 10s",
      11: "4m 30s", 12: "9m 15s", 13: "19m 00s", 14: "38m 20s", 15: "1h 17m"
    };

    function init() {
      isSolving = false;
      const n = Math.min(parseInt(document.getElementById("discCount").value), 15);
      document.getElementById("discCount").value = n;
      towers = { 1: [], 2: [], 3: [] }; moveHistory = []; moves = 0;
      gameActive = true; timerRunning = false; isPaused = false; totalElapsedBeforePause = 0;
      
      document.body.classList.remove("paused-game");
      document.getElementById("pauseBtn").textContent = "Pause (Space)";
      document.getElementById("moveCount").textContent = "0";
      document.getElementById("message").textContent = "";
      document.getElementById("solveBtn").disabled = false;
      
      setMedalTargets(n);
      updateRecordsDisplay();
      resetTimer();

      [1, 2, 3].forEach(id => {
        const el = document.getElementById(`tower${id}`);
        el.innerHTML = ""; el.classList.remove("selected");
        setupDropEvents(el);
      });

      for (let i = n; i >= 1; i--) { towers[1].push(i); createDiscElement(1, i, n); }
      updateDraggability();
    }

    function setMedalTargets(n) {
      const perfect = Math.pow(2, n) - 1;
      document.getElementById("targetGoldMoves").textContent = perfect;
      document.getElementById("targetSilverMoves").textContent = Math.ceil(perfect * 1.2);
      document.getElementById("targetBronzeMoves").textContent = Math.ceil(perfect * 1.5);
      const goldSeconds = Math.ceil(perfect / 2);
      document.getElementById("targetGoldTime").textContent = goldSeconds + "s";
      document.getElementById("targetSilverTime").textContent = Math.ceil(goldSeconds * 1.6) + "s";
      document.getElementById("targetBronzeTime").textContent = Math.ceil(goldSeconds * 2.5) + "s";
      document.getElementById("wrCount").textContent = n;
      document.getElementById("worldRecord").textContent = worldRecords[n] || "N/A";
    }

    function createDiscElement(towerId, size, max) {
      const disc = document.createElement("div");
      disc.className = "disc";
      disc.id = "disc-" + size;
      disc.style.width = (25 + (size / max * 70)) + "%";
      const hue = (size * 25) % 360;
      disc.style.background = `hsl(${hue}, 65%, 55%)`;
      disc.textContent = size;
      disc.addEventListener("dragstart", (e) => {
        if(!gameActive || isPaused || isSolving) { e.preventDefault(); return; }
        if(!timerRunning) startTimer();
        e.dataTransfer.setData("fromTower", towerId);
      });
      document.getElementById(`tower${towerId}`).appendChild(disc);
    }

    function executeMove(fromId, toId, isUndo = false) {
      if (fromId === toId || isPaused) return;
      const discSize = towers[fromId][towers[fromId].length - 1];
      const targetStack = towers[toId];
      const targetSize = targetStack[targetStack.length - 1];

      if (!targetSize || discSize < targetSize) {
        if (!timerRunning && !isUndo && !isSolving) startTimer();
        if (!isUndo) moveHistory.push({ from: fromId, to: toId });
        towers[toId].push(towers[fromId].pop());
        document.getElementById(`tower${toId}`).appendChild(document.getElementById(`disc-${discSize}`));
        moves += isUndo ? -1 : 1;
        document.getElementById("moveCount").textContent = moves;
        updateDraggability();
        checkWin();
      }
    }

    async function autoSolve() {
      if(!gameActive || isSolving) return;
      init(); 
      isSolving = true; gameActive = false;
      document.getElementById("solveBtn").disabled = true;
      const speed = parseInt(document.getElementById("solveSpeed").value);
      const movesList = [];
      function hanoi(n, from, to, aux) {
        if (n === 1) { movesList.push([from, to]); return; }
        hanoi(n - 1, from, aux, to);
        movesList.push([from, to]);
        hanoi(n - 1, aux, to, from);
      }
      hanoi(parseInt(document.getElementById("discCount").value), 1, 3, 2);
      for (let move of movesList) {
        if (!isSolving) break;
        executeMove(move[0], move[1]);
        await new Promise(r => setTimeout(r, speed));
      }
      isSolving = false;
      document.getElementById("message").textContent = "AI FINISHED";
    }

    function checkWin() {
      const n = parseInt(document.getElementById("discCount").value);
      if (towers[3].length === n) {
        gameActive = false; timerRunning = false;
        clearInterval(timerInterval);
        if (!isSolving) {
            const elapsed = ((Date.now() - startTime) + totalElapsedBeforePause) / 1000;
            document.getElementById("message").textContent = "🏆 VICTORY!";
            saveRecords(n);
        }
        document.getElementById("checkBlind").checked = false;
        applyVisualSettings();
      }
    }

    function saveRecords(n) {
      const timeStr = document.getElementById("timer").textContent;
      const elapsed = (Date.now() - startTime) + totalElapsedBeforePause;
      let records = JSON.parse(localStorage.getItem('hanoi_records') || '{}');
      if (!records[n]) records[n] = { time: Infinity, timeStr: "--:--", moves: Infinity };
      
      let improved = false;
      if (moves < records[n].moves) { records[n].moves = moves; improved = true; }
      if (elapsed < records[n].time) { records[n].time = elapsed; records[n].timeStr = timeStr; improved = true; }

      if (improved) {
        localStorage.setItem('hanoi_records', JSON.stringify(records));
        updateRecordsDisplay();
      }
    }

    function updateRecordsDisplay() {
      const records = JSON.parse(localStorage.getItem('hanoi_records') || '{}');
      const tableBody = document.getElementById("recordTableBody");
      tableBody.innerHTML = "";
      
      Object.keys(records).sort((a,b) => a-b).forEach(n => {
        const row = tableBody.insertRow();
        const perfect = Math.pow(2, n) - 1;
        const status = records[n].moves === perfect ? "🥇 Perfect" : "🥈 Finished";
        row.innerHTML = `<td>${n} Rings</td><td>${records[n].moves}</td><td>${records[n].timeStr}</td><td style="color:var(--gold)">${status}</td>`;
      });
    }

    function startTimer(resuming = false) {
      timerRunning = true; if (!resuming) startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) + totalElapsedBeforePause;
        const mins = Math.floor(elapsed / 60000).toString().padStart(2, '0');
        const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function togglePause() {
      if ((!timerRunning && moves === 0) || !gameActive || isSolving) return;
      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(timerInterval); totalElapsedBeforePause += (Date.now() - startTime);
        document.body.classList.add("paused-game");
        document.getElementById("pauseBtn").textContent = "Resume (Space)";
      } else {
        startTime = Date.now(); startTimer(true);
        document.body.classList.remove("paused-game");
        document.getElementById("pauseBtn").textContent = "Pause (Space)";
      }
    }

    function applyVisualSettings() {
      const body = document.getElementById("game-body");
      document.getElementById("checkNumbers").checked ? body.classList.remove("hide-numbers") : body.classList.add("hide-numbers");
      document.getElementById("checkMono").checked ? body.classList.add("monochrome") : body.classList.remove("monochrome");
      document.getElementById("checkBlind").checked ? body.classList.add("blindfolded") : body.classList.remove("blindfolded");
    }

    function undoMove() { if (moveHistory.length > 0 && gameActive && !isPaused && !isSolving) { const last = moveHistory.pop(); executeMove(last.to, last.from, true); } }
    function resetTimer() { clearInterval(timerInterval); document.getElementById("timer").textContent = "00:00"; timerRunning = false; }
    function toggleModal() { const m = document.getElementById("settingsModal"); m.style.display = (m.style.display === "block") ? "none" : "block"; }
    function setupDropEvents(towerEl) {
      towerEl.addEventListener("dragover", (e) => e.preventDefault());
      towerEl.addEventListener("drop", (e) => executeMove(parseInt(e.dataTransfer.getData("fromTower")), parseInt(towerEl.dataset.id)));
    }
    function updateDraggability() { [1, 2, 3].forEach(id => { const discs = document.getElementById(`tower${id}`).querySelectorAll(".disc"); discs.forEach((d, idx) => d.draggable = (idx === discs.length - 1 && gameActive)); }); }
    function clearAllProgress() { if(confirm("Reset all?")) { localStorage.removeItem('hanoi_records'); updateRecordsDisplay(); toggleModal(); } }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); togglePause(); }
      if (isPaused || isSolving) return;
      const key = e.key.toLowerCase();
      if (key === 'u') undoMove();
      if (key === 'r') init();
      if (["1", "2", "3"].includes(key) && gameActive) {
        if(!timerRunning) startTimer();
        const tid = parseInt(key);
        if (selectedTower === null) {
          if (towers[tid].length > 0) { selectedTower = tid; document.getElementById(`tower${tid}`).classList.add("selected"); }
        } else {
          const from = selectedTower; document.getElementById(`tower${from}`).classList.remove("selected");
          selectedTower = null; executeMove(from, tid);
        }
      }
    });

    init();
  </script>
</body>
</html>
