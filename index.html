<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tower of Hanoi - Pro</title>
  <style>
    :root {
      --wood: #5d4037;
      --bg-color: #0a192f;
      --text-color: #64ffda;
      --accent: #112240;
    }
    body {
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      overflow-x: hidden;
    }
    h1 { margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; }

    .stats-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 10px;
      font-size: 1.1rem;
    }

    .controls { margin: 20px; padding: 15px; background: var(--accent); border-radius: 8px; display: inline-block; }
    
    .tower-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 500px; /* Taller area for more rings */
      gap: 60px;
      padding-bottom: 50px;
      margin-top: 40px; /* Moved lower down */
    }

    .tower {
      width: 180px;
      height: 400px;
      position: relative;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      cursor: pointer;
      border-radius: 10px 10px 0 0;
    }
    .tower.selected { background: rgba(100, 255, 218, 0.1); border-radius: 10px; }

    .tower::before {
      content: "";
      position: absolute;
      bottom: 0;
      width: 12px;
      height: 100%;
      background: var(--wood);
      border-radius: 6px;
      z-index: 1;
    }
    .tower::after {
      content: "";
      position: absolute;
      bottom: -15px;
      width: 200px;
      height: 15px;
      background: var(--wood);
      border-radius: 5px;
    }

    .disc {
      height: 22px;
      margin-bottom: 2px;
      border-radius: 5px;
      color: #0a192f;
      text-align: center;
      line-height: 22px;
      font-size: 12px;
      font-weight: bold;
      z-index: 2;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
      transition: transform 0.1s, background 0.3s;
    }

    button, input {
      background: transparent;
      border: 1px solid var(--text-color);
      color: var(--text-color);
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: var(--text-color); color: var(--bg-color); }
    
    #timer { position: fixed; top: 20px; right: 20px; font-size: 1.5rem; color: #f1c40f; }
    #message { margin-top: 20px; font-size: 1.5rem; height: 30px; }
  </style>
</head>
<body>

  <div id="timer">00:00</div>

  <h1>Tower of Hanoi</h1>

  <div class="stats-container">
    <div>Moves: <span id="moveCount">0</span></div>
    <div>Ideal: <span id="idealMoves">0</span></div>
  </div>

  <div class="controls">
    <label>Discs (Max 15):</label>
    <input type="number" id="discCount" value="3" min="3" max="15">
    <button onclick="init()">Restart</button>
  </div>

  <div class="tower-container" id="game-container">
    <div class="tower" id="tower1" data-id="1"></div>
    <div class="tower" id="tower2" data-id="2"></div>
    <div class="tower" id="tower3" data-id="3"></div>
  </div>

  <div id="message"></div>

  <script>
    let towers = { 1: [], 2: [], 3: [] };
    let selectedTower = null;
    let moves = 0;
    let startTime;
    let timerInterval;
    let gameActive = false;

    function init() {
      const n = Math.min(parseInt(document.getElementById("discCount").value), 15);
      towers = { 1: [], 2: [], 3: [] };
      moves = 0;
      gameActive = true;
      document.getElementById("moveCount").textContent = "0";
      document.getElementById("message").textContent = "";
      document.getElementById("idealMoves").textContent = Math.pow(2, n) - 1;
      
      resetTimer();
      startTimer();

      [1, 2, 3].forEach(id => {
        const el = document.getElementById(`tower${id}`);
        el.innerHTML = "";
        el.classList.remove("selected");
        setupDropEvents(el);
      });

      for (let i = n; i >= 1; i--) {
        towers[1].push(i);
        createDiscElement(1, i, n);
      }
      updateDraggability();
    }

    function createDiscElement(towerId, size, max) {
      const disc = document.createElement("div");
      disc.className = "disc";
      disc.id = "disc-" + size;
      // Dynamic sizing for up to 15 rings
      disc.style.width = (20 + (size / max * 80)) + "%";
      // Gradient of colors based on size
      const hue = (size * 25) % 360;
      disc.style.background = `hsl(${hue}, 70%, 60%)`;
      disc.dataset.size = size;
      
      disc.addEventListener("dragstart", (e) => {
        if(!gameActive) return;
        e.dataTransfer.setData("fromTower", towerId);
      });

      document.getElementById(`tower${towerId}`).appendChild(disc);
    }

    function updateDraggability() {
      [1, 2, 3].forEach(id => {
        const discs = document.getElementById(`tower${id}`).querySelectorAll(".disc");
        discs.forEach((d, idx) => {
          d.draggable = (idx === discs.length - 1 && gameActive);
        });
      });
    }

    function setupDropEvents(towerEl) {
      towerEl.addEventListener("dragover", (e) => e.preventDefault());
      towerEl.addEventListener("drop", (e) => {
        const fromTowerId = parseInt(e.dataTransfer.getData("fromTower"));
        const toTowerId = parseInt(towerEl.dataset.id);
        executeMove(fromTowerId, toTowerId);
      });
    }

    function executeMove(fromId, toId) {
      if (fromId === toId || isNaN(fromId)) return;
      
      const discSize = towers[fromId][towers[fromId].length - 1];
      const targetTowerStack = towers[toId];
      const targetTowerSize = targetTowerStack[targetTowerStack.length - 1];

      // Pure logic: if illegal, just do nothing
      if (!targetTowerSize || discSize < targetTowerSize) {
        towers[toId].push(towers[fromId].pop());
        const discElem = document.getElementById(`disc-${discSize}`);
        document.getElementById(`tower${toId}`).appendChild(discElem);
        
        moves++;
        document.getElementById("moveCount").textContent = moves;
        
        updateDraggability();
        checkWin();
      }
    }

    function checkWin() {
      const n = parseInt(document.getElementById("discCount").value);
      if (towers[3].length === n) {
        gameActive = false;
        clearInterval(timerInterval);
        document.getElementById("message").textContent = "MISSION COMPLETE";
        updateDraggability();
      }
    }

    // Timer logic
    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const mins = Math.floor(elapsed / 60000).toString().padStart(2, '0');
        const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      document.getElementById("timer").textContent = "00:00";
    }

    // Keyboard Logic
    window.addEventListener("keydown", (e) => {
      if(!gameActive) return;
      const key = e.key;
      if (["1", "2", "3"].includes(key)) {
        const towerId = parseInt(key);
        if (selectedTower === null) {
          if (towers[towerId].length > 0) {
            selectedTower = towerId;
            document.getElementById(`tower${towerId}`).classList.add("selected");
          }
        } else {
          const fromId = selectedTower;
          document.getElementById(`tower${fromId}`).classList.remove("selected");
          selectedTower = null;
          executeMove(fromId, towerId);
        }
      }
    });

    init();
  </script>
</body>
</html>
