<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tower of Hanoi - Ultimate</title>
  <style>
    :root {
      --wood: #5d4037;
      --bg-color: #0a192f;
      --text-color: #64ffda;
      --accent: #112240;
      --gold: #f1c40f;
    }
    body {
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      overflow: hidden;
    }
    h1 { margin-top: 15px; text-transform: uppercase; letter-spacing: 3px; font-size: 1.5rem; }

    .stats-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 10px;
      font-size: 0.9rem;
    }
    .records { color: var(--gold); margin-bottom: 10px; }

    .controls { margin: 10px; padding: 12px; background: var(--accent); border-radius: 8px; display: inline-block; z-index: 100; position: relative; }
    
    .tower-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 450px;
      gap: 60px;
      padding-bottom: 50px;
      margin-top: 20px;
      transition: opacity 0.3s, filter 0.3s;
    }

    .paused-game .tower-container { opacity: 0.1; pointer-events: none; }

    /* Blindfold Mode Styling */
    .blindfolded .tower-container {
      filter: brightness(0);
      background: black;
    }
    .blindfolded .tower-container:hover {
      filter: brightness(0.1); /* Slight peek on hover */
    }

    .tower {
      width: 160px;
      height: 380px;
      position: relative;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .tower.selected { background: rgba(100, 255, 218, 0.15); }

    .tower::before {
      content: "";
      position: absolute; bottom: 0; width: 12px; height: 100%;
      background: var(--wood); border-radius: 6px; z-index: 1;
    }
    .tower::after {
      content: "";
      position: absolute; bottom: -15px; width: 180px; height: 15px;
      background: var(--wood); border-radius: 5px;
    }

    .disc {
      height: 20px; margin-bottom: 2px; border-radius: 4px;
      color: #0a192f; text-align: center; line-height: 20px;
      font-size: 11px; font-weight: bold; z-index: 2;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .hide-numbers .disc { color: transparent; }
    .monochrome .disc { background: #ccd6f6 !important; color: #0a192f !important; border: 1px solid #8892b0; }

    button, input {
      background: transparent; border: 1px solid var(--text-color);
      color: var(--text-color); padding: 5px 12px; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: var(--text-color); color: var(--bg-color); }
    
    #timer { position: fixed; top: 20px; right: 20px; font-size: 1.2rem; color: var(--gold); }
    #message { margin-top: 15px; font-size: 1.2rem; height: 25px; color: var(--gold); }

    #settingsModal {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
      background-color: var(--accent); margin: 5% auto; padding: 20px;
      border: 1px solid var(--text-color); width: 420px; border-radius: 10px;
      position: relative; text-align: left;
    }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: var(--text-color); }
    .setting-row { margin: 15px 0; display: flex; align-items: center; justify-content: space-between; }
    .reset-all { border-color: #ff4d4d; color: #ff4d4d; margin-top: 20px; width: 100%; }
  </style>
</head>
<body id="game-body">

  <div id="timer">00:00</div>

  <h1>Tower of Hanoi</h1>

  <div class="records">
    🏆 Best Time: <span id="recordTime">--:--</span> | 
    Best Moves: <span id="recordMoves">--</span>
  </div>

  <div class="stats-container">
    <div>Moves: <span id="moveCount">0</span></div>
    <div>Ideal: <span id="idealMoves">0</span></div>
  </div>

  <div class="controls">
    <label>Discs: </label>
    <input type="number" id="discCount" value="3" min="3" max="15" onkeydown="if(event.key==='Enter') init()">
    <span style="font-size: 0.8rem; margin-right: 10px;">(Max 15)</span>
    <button onclick="init()">Restart (R)</button>
    <button onclick="togglePause()" id="pauseBtn">Pause (Space)</button>
    <button onclick="undoMove()">Undo (U)</button>
    <button onclick="toggleModal()">Settings</button>
  </div>

  <div class="tower-container" id="game-container">
    <div class="tower" id="tower1" data-id="1"></div>
    <div class="tower" id="tower2" data-id="2"></div>
    <div class="tower" id="tower3" data-id="3"></div>
  </div>

  <div id="message"></div>

  <div id="settingsModal">
    <div class="modal-content">
      <span class="close-btn" onclick="toggleModal()">&times;</span>
      <h3>Settings</h3>
      
      <div class="setting-row">
        <label>Show Ring Numbers</label>
        <input type="checkbox" id="checkNumbers" checked onchange="applyVisualSettings()">
      </div>
      <div class="setting-row">
        <label>Monochrome Mode</label>
        <input type="checkbox" id="checkMono" onchange="applyVisualSettings()">
      </div>
      <div class="setting-row" style="color: #ff4d4d; font-weight: bold;">
        <label>BLINDFOLD MODE 🕶️</label>
        <input type="checkbox" id="checkBlind" onchange="applyVisualSettings()">
      </div>

      <hr style="border: 0.5px solid #233554; margin: 15px 0;">
      
      <h3>Controls</h3>
      <ul style="font-size: 0.85rem;">
        <li><strong>Numbers 1, 2, 3:</strong> Select Towers</li>
        <li><strong>Space:</strong> Pause/Unpause</li>
        <li><strong>U Key:</strong> Undo last move</li>
        <li><strong>R Key:</strong> Restart level</li>
      </ul>
      <button class="reset-all" onclick="clearAllProgress()">RESET ALL PROGRESS</button>
    </div>
  </div>

  <script>
    let towers = { 1: [], 2: [], 3: [] };
    let moveHistory = [];
    let selectedTower = null;
    let moves = 0;
    let startTime, timerInterval;
    let gameActive = false;
    let timerRunning = false;
    let isPaused = false;
    let totalElapsedBeforePause = 0;

    function init() {
      const n = Math.min(parseInt(document.getElementById("discCount").value), 15);
      document.getElementById("discCount").value = n;
      towers = { 1: [], 2: [], 3: [] };
      moveHistory = [];
      moves = 0;
      gameActive = true;
      timerRunning = false;
      isPaused = false;
      totalElapsedBeforePause = 0;
      
      document.body.classList.remove("paused-game");
      document.getElementById("pauseBtn").textContent = "Pause (Space)";
      document.getElementById("moveCount").textContent = "0";
      document.getElementById("message").textContent = "";
      document.getElementById("idealMoves").textContent = Math.pow(2, n) - 1;
      
      applyVisualSettings();
      updateRecordsDisplay();
      resetTimer();

      [1, 2, 3].forEach(id => {
        const el = document.getElementById(`tower${id}`);
        el.innerHTML = "";
        el.classList.remove("selected");
        setupDropEvents(el);
      });

      for (let i = n; i >= 1; i--) {
        towers[1].push(i);
        createDiscElement(1, i, n);
      }
      updateDraggability();
    }

    function createDiscElement(towerId, size, max) {
      const disc = document.createElement("div");
      disc.className = "disc";
      disc.id = "disc-" + size;
      disc.style.width = (25 + (size / max * 70)) + "%";
      const hue = (size * 20) % 360;
      disc.style.background = `hsl(${hue}, 60%, 50%)`;
      disc.textContent = size;
      
      disc.addEventListener("dragstart", (e) => {
        if(!gameActive || isPaused) { e.preventDefault(); return; }
        if(!timerRunning) startTimer();
        e.dataTransfer.setData("fromTower", towerId);
      });

      document.getElementById(`tower${towerId}`).appendChild(disc);
    }

    function togglePause() {
      if (!timerRunning && moves === 0) return;
      if (!gameActive) return;

      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(timerInterval);
        totalElapsedBeforePause += (Date.now() - startTime);
        document.body.classList.add("paused-game");
        document.getElementById("pauseBtn").textContent = "Resume (Space)";
      } else {
        startTime = Date.now();
        startTimer(true);
        document.body.classList.remove("paused-game");
        document.getElementById("pauseBtn").textContent = "Pause (Space)";
      }
    }

    function executeMove(fromId, toId, isUndo = false) {
      if (fromId === toId || isNaN(fromId) || isPaused) return;
      
      const discSize = towers[fromId][towers[fromId].length - 1];
      const targetStack = towers[toId];
      const targetSize = targetStack[targetStack.length - 1];

      if (!targetSize || discSize < targetSize) {
        if (!timerRunning && !isUndo) startTimer();
        if (!isUndo) moveHistory.push({ from: fromId, to: toId });
        
        towers[toId].push(towers[fromId].pop());
        const discElem = document.getElementById(`disc-${discSize}`);
        document.getElementById(`tower${toId}`).appendChild(discElem);
        
        moves += isUndo ? -1 : 1;
        document.getElementById("moveCount").textContent = moves;
        
        updateDraggability();
        checkWin();
      }
    }

    function checkWin() {
      const n = parseInt(document.getElementById("discCount").value);
      if (towers[3].length === n) {
        gameActive = false;
        timerRunning = false;
        clearInterval(timerInterval);
        document.getElementById("message").textContent = "LEVEL COMPLETE!";
        // Turn off blindfold mode once solved
        document.getElementById("checkBlind").checked = false;
        applyVisualSettings();
        saveRecords(n);
      }
    }

    function applyVisualSettings() {
      const body = document.getElementById("game-body");
      const showNumbers = document.getElementById("checkNumbers").checked;
      const isMono = document.getElementById("checkMono").checked;
      const isBlind = document.getElementById("checkBlind").checked;

      showNumbers ? body.classList.remove("hide-numbers") : body.classList.add("hide-numbers");
      isMono ? body.classList.add("monochrome") : body.classList.remove("monochrome");
      isBlind ? body.classList.add("blindfolded") : body.classList.remove("blindfolded");
    }

    function startTimer(resuming = false) {
      timerRunning = true;
      if (!resuming) startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) + totalElapsedBeforePause;
        const mins = Math.floor(elapsed / 60000).toString().padStart(2, '0');
        const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function undoMove() { if (moveHistory.length > 0 && gameActive && !isPaused) { const last = moveHistory.pop(); executeMove(last.to, last.from, true); } }
    function resetTimer() { clearInterval(timerInterval); document.getElementById("timer").textContent = "00:00"; timerRunning = false; }
    function toggleModal() { const m = document.getElementById("settingsModal"); m.style.display = (m.style.display === "block") ? "none" : "block"; }
    function setupDropEvents(towerEl) {
      towerEl.addEventListener("dragover", (e) => e.preventDefault());
      towerEl.addEventListener("drop", (e) => executeMove(parseInt(e.dataTransfer.getData("fromTower")), parseInt(towerEl.dataset.id)));
    }
    function updateDraggability() { [1, 2, 3].forEach(id => { const discs = document.getElementById(`tower${id}`).querySelectorAll(".disc"); discs.forEach((d, idx) => d.draggable = (idx === discs.length - 1 && gameActive)); }); }
    function updateRecordsDisplay() {
      const n = document.getElementById("discCount").value;
      const records = JSON.parse(localStorage.getItem('hanoi_records') || '{}');
      const rec = records[n] || { timeStr: "--:--", moves: "--" };
      document.getElementById("recordTime").textContent = rec.timeStr;
      document.getElementById("recordMoves").textContent = rec.moves;
    }
    function saveRecords(n) {
      const timeStr = document.getElementById("timer").textContent;
      const elapsed = (Date.now() - startTime) + totalElapsedBeforePause;
      let records = JSON.parse(localStorage.getItem('hanoi_records') || '{}');
      if (!records[n]) records[n] = { time: Infinity, timeStr: "--:--", moves: Infinity };
      let improved = false;
      if (moves < records[n].moves) { records[n].moves = moves; improved = true; }
      if (elapsed < records[n].time) { records[n].time = elapsed; records[n].timeStr = timeStr; improved = true; }
      if (improved) { localStorage.setItem('hanoi_records', JSON.stringify(records)); updateRecordsDisplay(); }
    }
    function clearAllProgress() { if(confirm("Reset all?")) { localStorage.removeItem('hanoi_records'); updateRecordsDisplay(); toggleModal(); } }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (e.code === "Space") { e.preventDefault(); togglePause(); }
      if (isPaused) return;
      if (key === 'u') undoMove();
      if (key === 'r') init();
      if (["1", "2", "3"].includes(key) && gameActive) {
        const tid = parseInt(key);
        if (selectedTower === null) {
          if (towers[tid].length > 0) { selectedTower = tid; document.getElementById(`tower${tid}`).classList.add("selected"); }
        } else {
          const from = selectedTower; document.getElementById(`tower${from}`).classList.remove("selected");
          selectedTower = null; executeMove(from, tid);
        }
      }
    });

    init();
  </script>
</body>
</html>
