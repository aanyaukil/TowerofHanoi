<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tower of Hanoi - Ultimate</title>
  <style>
    :root {
      --wood: #5d4037;
      --bg-color: #0a192f;
      --text-color: #64ffda;
      --accent: #112240;
      --gold: #f1c40f;
    }
    body {
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      background: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      overflow: hidden;
    }
    h1 { margin-top: 15px; text-transform: uppercase; letter-spacing: 3px; font-size: 1.5rem; }

    .stats-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 10px;
      font-size: 0.9rem;
    }
    .records { color: var(--gold); margin-bottom: 10px; }

    .controls { margin: 10px; padding: 12px; background: var(--accent); border-radius: 8px; display: inline-block; }
    
    .tower-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 450px;
      gap: 60px;
      padding-bottom: 50px;
      margin-top: 20px;
    }

    .tower {
      width: 160px;
      height: 380px;
      position: relative;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .tower.selected { background: rgba(100, 255, 218, 0.15); }

    .tower::before {
      content: "";
      position: absolute; bottom: 0; width: 12px; height: 100%;
      background: var(--wood); border-radius: 6px; z-index: 1;
    }
    .tower::after {
      content: "";
      position: absolute; bottom: -15px; width: 180px; height: 15px;
      background: var(--wood); border-radius: 5px;
    }

    .disc {
      height: 20px; margin-bottom: 2px; border-radius: 4px;
      color: #0a192f; text-align: center; line-height: 20px;
      font-size: 11px; font-weight: bold; z-index: 2;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    button, input {
      background: transparent; border: 1px solid var(--text-color);
      color: var(--text-color); padding: 5px 12px; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: var(--text-color); color: var(--bg-color); }
    
    #timer { position: fixed; top: 20px; right: 20px; font-size: 1.2rem; color: var(--gold); }
    #message { margin-top: 15px; font-size: 1.2rem; height: 25px; color: var(--gold); }

    /* Modal Styling */
    #settingsModal {
      display: none; position: fixed; z-index: 10; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
      background-color: var(--accent); margin: 10% auto; padding: 20px;
      border: 1px solid var(--text-color); width: 400px; border-radius: 10px;
      position: relative; text-align: left;
    }
    .close-btn {
      position: absolute; top: 10px; right: 15px; font-size: 24px;
      cursor: pointer; color: var(--text-color);
    }
    .reset-all { border-color: #ff4d4d; color: #ff4d4d; margin-top: 20px; width: 100%; }
    .reset-all:hover { background: #ff4d4d; color: white; }
  </style>
</head>
<body>

  <div id="timer">00:00</div>

  <h1>Tower of Hanoi</h1>

  <div class="records">
    🏆 Best Time: <span id="recordTime">--:--</span> | 
    Best Moves: <span id="recordMoves">--</span>
  </div>

  <div class="stats-container">
    <div>Moves: <span id="moveCount">0</span></div>
    <div>Ideal: <span id="idealMoves">0</span></div>
  </div>

  <div class="controls">
    <label>Discs: </label>
    <input type="number" id="discCount" value="3" min="3" max="15">
    <span>(Max 15 rings)</span>
    <button onclick="init()">Restart (R)</button>
    <button onclick="undoMove()">Undo (U)</button>
    <button onclick="toggleModal()">Settings</button>
  </div>

  <div class="tower-container" id="game-container">
    <div class="tower" id="tower1" data-id="1"></div>
    <div class="tower" id="tower2" data-id="2"></div>
    <div class="tower" id="tower3" data-id="3"></div>
  </div>

  <div id="message"></div>

  <div id="settingsModal">
    <div class="modal-content">
      <span class="close-btn" onclick="toggleModal()">&times;</span>
      <h3>Game Controls</h3>
      <ul>
        <li><strong>Numbers 1, 2, 3:</strong> Select/Move Towers</li>
        <li><strong>U Key:</strong> Undo last move</li>
        <li><strong>R Key:</strong> Restart level</li>
        <li><strong>Drag & Drop:</strong> Use mouse to move rings</li>
      </ul>
      <p><small>Timer starts on your first move!</small></p>
      <button class="reset-all" onclick="clearAllProgress()">RESET ALL PROGRESS</button>
    </div>
  </div>

  <script>
    let towers = { 1: [], 2: [], 3: [] };
    let moveHistory = [];
    let selectedTower = null;
    let moves = 0;
    let startTime, timerInterval;
    let gameActive = false;
    let timerRunning = false;

    function init() {
      const n = Math.min(parseInt(document.getElementById("discCount").value), 15);
      towers = { 1: [], 2: [], 3: [] };
      moveHistory = [];
      moves = 0;
      gameActive = true;
      timerRunning = false; // Reset timer state
      
      document.getElementById("moveCount").textContent = "0";
      document.getElementById("message").textContent = "";
      document.getElementById("idealMoves").textContent = Math.pow(2, n) - 1;
      
      updateRecordsDisplay();
      resetTimer();

      [1, 2, 3].forEach(id => {
        const el = document.getElementById(`tower${id}`);
        el.innerHTML = "";
        el.classList.remove("selected");
        setupDropEvents(el);
      });

      for (let i = n; i >= 1; i--) {
        towers[1].push(i);
        createDiscElement(1, i, n);
      }
      updateDraggability();
    }

    function createDiscElement(towerId, size, max) {
      const disc = document.createElement("div");
      disc.className = "disc";
      disc.id = "disc-" + size;
      disc.style.width = (25 + (size / max * 70)) + "%";
      const hue = (size * 20) % 360;
      disc.style.background = `hsl(${hue}, 60%, 50%)`;
      disc.dataset.size = size;
      
      disc.addEventListener("dragstart", (e) => {
        if(!gameActive) return;
        e.dataTransfer.setData("fromTower", towerId);
      });

      document.getElementById(`tower${towerId}`).appendChild(disc);
    }

    function executeMove(fromId, toId, isUndo = false) {
      if (fromId === toId || isNaN(fromId)) return;
      
      const discSize = towers[fromId][towers[fromId].length - 1];
      const targetTowerStack = towers[toId];
      const targetSize = targetTowerStack[targetTowerStack.length - 1];

      if (!targetSize || discSize < targetSize) {
        // START TIMER ON FIRST SUCCESSFUL MOVE
        if (!timerRunning && !isUndo) {
          startTimer();
        }

        if (!isUndo) moveHistory.push({ from: fromId, to: toId });
        
        towers[toId].push(towers[fromId].pop());
        const discElem = document.getElementById(`disc-${discSize}`);
        document.getElementById(`tower${toId}`).appendChild(discElem);
        
        moves += isUndo ? -1 : 1;
        document.getElementById("moveCount").textContent = moves;
        
        updateDraggability();
        checkWin();
      }
    }

    function undoMove() {
      if (moveHistory.length === 0 || !gameActive) return;
      const lastMove = moveHistory.pop();
      executeMove(lastMove.to, lastMove.from, true);
    }

    function checkWin() {
      const n = parseInt(document.getElementById("discCount").value);
      if (towers[3].length === n) {
        gameActive = false;
        timerRunning = false;
        clearInterval(timerInterval);
        document.getElementById("message").textContent = "LEVEL COMPLETE!";
        saveRecords(n);
      }
    }

    // Records Logic
    function saveRecords(n) {
      const timeStr = document.getElementById("timer").textContent;
      const currentTimeMs = Date.now() - startTime;
      
      let records = JSON.parse(localStorage.getItem('hanoi_records') || '{}');
      if (!records[n]) records[n] = { time: Infinity, timeStr: "--:--", moves: Infinity };

      let improved = false;
      if (moves < records[n].moves) { records[n].moves = moves; improved = true; }
      if (currentTimeMs < records[n].time) { 
        records[n].time = currentTimeMs; 
        records[n].timeStr = timeStr; 
        improved = true; 
      }

      if (improved) {
        localStorage.setItem('hanoi_records', JSON.stringify(records));
        updateRecordsDisplay();
      }
    }

    function updateRecordsDisplay() {
      const n = document.getElementById("discCount").value;
      const records = JSON.parse(localStorage.getItem('hanoi_records') || '{}');
      const rec = records[n] || { timeStr: "--:--", moves: "--" };
      document.getElementById("recordTime").textContent = rec.timeStr;
      document.getElementById("recordMoves").textContent = rec.moves;
    }

    function clearAllProgress() {
      if(confirm("Delete all high scores?")) {
        localStorage.removeItem('hanoi_records');
        updateRecordsDisplay();
        toggleModal();
      }
    }

    // UI & Timer
    function toggleModal() {
      const m = document.getElementById("settingsModal");
      m.style.display = (m.style.display === "block") ? "none" : "block";
    }

    function startTimer() {
      timerRunning = true;
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const mins = Math.floor(elapsed / 60000).toString().padStart(2, '0');
        const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById("timer").textContent = `${mins}:${secs}`;
      }, 1000);
    }

    function resetTimer() { 
      clearInterval(timerInterval); 
      document.getElementById("timer").textContent = "00:00"; 
      timerRunning = false;
    }

    function updateDraggability() {
      [1, 2, 3].forEach(id => {
        const discs = document.getElementById(`tower${id}`).querySelectorAll(".disc");
        discs.forEach((d, idx) => d.draggable = (idx === discs.length - 1 && gameActive));
      });
    }

    function setupDropEvents(towerEl) {
      towerEl.addEventListener("dragover", (e) => e.preventDefault());
      towerEl.addEventListener("drop", (e) => {
        executeMove(parseInt(e.dataTransfer.getData("fromTower")), parseInt(towerEl.dataset.id));
      });
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === 'u') undoMove();
      if (key === 'r') init();
      if (["1", "2", "3"].includes(key) && gameActive) {
        const tid = parseInt(key);
        if (selectedTower === null) {
          if (towers[tid].length > 0) {
            selectedTower = tid;
            document.getElementById(`tower${tid}`).classList.add("selected");
          }
        } else {
          const from = selectedTower;
          document.getElementById(`tower${from}`).classList.remove("selected");
          selectedTower = null;
          executeMove(from, tid);
        }
      }
    });

    init();
  </script>
</body>
</html>
